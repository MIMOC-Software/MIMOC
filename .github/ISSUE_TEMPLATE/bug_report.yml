name: Bug report
description: Report a non-security issue in MIMOC documentation or Early Access builds.
title: "Bug report: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for non-security issues only.

        Do not include credentials, private keys, license files, production databases, internal IP ranges or unredacted logs.

  - type: input
    id: version
    attributes:
      label: MIMOC version
      placeholder: "Example: 1.0.0 Early Access"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installer
        - Login / users / roles
        - Dashboard
        - Inventory / CMDB
        - Network Discovery
        - WMI Discovery
        - Software Scanner
        - Power Manager
        - Software Deployment
        - Task Scheduler
        - Credential Vault
        - Backup / Restore
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: "Describe the issue clearly."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence of steps. Do not include sensitive data.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide non-sensitive environment details.
      placeholder: |
        Windows version:
        Browser:
        Install type:
        Approximate asset count:
    validations:
      required: false
